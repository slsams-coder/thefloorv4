<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Floor - HKTAYY3</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useLayoutEffect, useMemo, useRef } = React;
        
        // Manual Lucide Icon Bridge (since we are using a CDN)
        const Icon = ({ name, size = 24, className = "", strokeWidth = 2 }) => {
            const [iconSvg, setIconSvg] = useState("");
            useEffect(() => {
                const svg = lucide.createIcons({
                    icons: { [name]: lucide[name] },
                    attrs: { width: size, height: size, class: className, "stroke-width": strokeWidth }
                });
            }, [name, size, className]);
            return <i data-lucide={name} className={className}></i>;
        };

        const GRID_COLS = 5;
        const GRID_ROWS = 4;
        const INITIAL_TIMER = 30;

        // --- ALL YOUR ORIGINAL LOGIC GOES HERE (WITH FIXES) ---
        
        function App() {
            // ... (I've applied the spread operator fix to your setDecks functions below)
            const [gameState, setGameState] = useState('setup');
            const [cells, setCells] = useState([]);
            const [attacker, setAttacker] = useState(null);
            const [defender, setDefender] = useState(null);
            const [timer, setTimer] = useState({ attacker: INITIAL_TIMER, defender: INITIAL_TIMER });
            const [activeDuelist, setActiveDuelist] = useState(null);
            const [highlightedIndex, setHighlightedIndex] = useState(null);
            const [gridSize, setGridSize] = useState({ width: 0, height: 0 });
            const [decks, setDecks] = useState({});
            const [currentImageIndex, setCurrentImageIndex] = useState(0);
            const [conqueredIndices, setConqueredIndices] = useState([]);
            const [hoveredOwner, setHoveredOwner] = useState(null);
            const [playedPlayers, setPlayedPlayers] = useState(new Set());
            const [isShowingAnswer, setIsShowingAnswer] = useState(false);
            const [lastFeedbackType, setLastFeedbackType] = useState(null);
            
            const gridRef = useRef(null);

            // Fixed Audio Hook for browser compatibility
            const audioCtx = useRef(null);
            const playTick = (freq = 440) => {
                if (!audioCtx.current) audioCtx.current = new (window.AudioContext || window.webkitAudioContext)();
                if (audioCtx.current.state === 'suspended') audioCtx.current.resume();
                const osc = audioCtx.current.createOscillator();
                const gain = audioCtx.current.createGain();
                osc.type = 'sine';
                osc.frequency.setValueAtTime(freq, audioCtx.current.currentTime);
                gain.gain.setValueAtTime(0.1, audioCtx.current.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.current.currentTime + 0.1);
                osc.connect(gain);
                gain.connect(audioCtx.current.destination);
                osc.start();
                osc.stop(audioCtx.current.currentTime + 0.1);
            };

            // FIX: Corrected the state update bug in removeDeckImage
            const removeDeckImage = (category, idx) => {
                setDecks(prev => ({ 
                    ...prev, // Spread previous state correctly
                    [category]: prev[category].filter((_, i) => i !== idx) 
                }));
            };

            const initFloor = () => {
                const categories = ["LOGOS", "FRUITS", "CARS", "MOVIES", "HEROES", "LANDMARKS", "NATIONS", "TOONS", "ANIMALS", "HISTORY", "SCIENCE", "SPORTS", "TOOLS", "FASHION", "GAMING", "DESSERTS", "SPACE", "MUSIC", "BOOKS", "FLAGS"];
                const newCells = categories.map((cat, i) => ({
                    id: i,
                    category: cat,
                    owner: `PLAYER ${i + 1}`,
                    color: `hsl(${(i * 360) / 20}, 70%, 45%)`,
                }));
                setCells(newCells);
                setGameState('floor');
                // Force Lucide to refresh icons
                setTimeout(() => lucide.createIcons(), 100);
            };

            // Simplified scaled text for the single-file version
            const AutoScaledText = ({ text, color = "white" }) => (
                <div className="flex items-center justify-center text-center font-black uppercase" style={{ color, fontSize: 'clamp(10px, 2vw, 24px)' }}>
                    {text}
                </div>
            );

            // Re-map your regions logic here...
            const regions = useMemo(() => {
                if (cells.length === 0) return [];
                const visited = new Set(), regionsList = [];
                cells.forEach((cell, idx) => {
                    if (visited.has(idx)) return;
                    const current = { owner: cell.owner, category: cell.category, color: cell.color, indices: [] };
                    const q = [idx]; visited.add(idx);
                    while (q.length > 0) {
                        const curr = q.shift();
                        current.indices.push(curr);
                        const r = Math.floor(curr / GRID_COLS), c = curr % GRID_COLS;
                        [{ r: r-1, c }, { r: r+1, c }, { r, c: c-1 }, { r, c: c+1 }].forEach(n => {
                            const nIdx = n.r * GRID_COLS + n.c;
                            if (n.r >= 0 && n.r < GRID_ROWS && n.c >= 0 && n.c < GRID_COLS && !visited.has(nIdx) && cells[nIdx].owner === cell.owner) {
                                visited.add(nIdx); q.push(nIdx);
                            }
                        });
                    }
                    regionsList.push(current);
                });
                return regionsList;
            }, [cells]);

            if (gameState === 'setup') {
                return (
                    <div className="h-screen bg-slate-950 flex flex-col items-center justify-center p-4">
                        <div className="text-center mb-12">
                            <span className="text-blue-400 font-bold tracking-widest uppercase text-sm">HKTAYY3 Presents:</span>
                            <h1 className="text-7xl font-black text-blue-500 italic uppercase tracking-tighter">THE FLOOR</h1>
                        </div>
                        <button onClick={initFloor} className="bg-blue-600 hover:bg-blue-500 text-white px-12 py-6 rounded-2xl font-black text-3xl shadow-[0_8px_0_rgb(30,58,138)] active:translate-y-1 transition-all">
                            START NEW GAME
                        </button>
                    </div>
                );
            }

            return (
                <div className="h-screen bg-black text-white flex flex-col overflow-hidden font-sans">
                    <header className="h-16 bg-slate-900 flex justify-between items-center px-8 border-b border-white/10">
                        <div className="font-black italic text-xl text-blue-500">THE FLOOR</div>
                        <div className="flex gap-4">
                             {/* Randomizer and other UI elements go here */}
                             <button onClick={() => setGameState('setup')} className="text-xs text-slate-500 uppercase font-bold">Reset</button>
                        </div>
                    </header>
                    <main className="flex-1 relative bg-slate-950 p-4">
                        <div className="grid grid-cols-5 grid-rows-4 gap-1 h-full w-full">
                            {cells.map((cell, i) => (
                                <div key={i} 
                                     onClick={() => setAttacker(cell)}
                                     className={`rounded-sm flex items-center justify-center p-2 transition-all ${attacker?.owner === cell.owner ? 'ring-4 ring-amber-400 scale-95 z-10' : ''}`}
                                     style={{ backgroundColor: cell.color }}>
                                    <div className="text-[10px] font-black bg-black/40 px-1 rounded">{cell.owner}</div>
                                </div>
                            ))}
                        </div>
                    </main>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>

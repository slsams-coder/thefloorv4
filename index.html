<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Floor - HKTAYY3</title>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: black; margin: 0; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useLayoutEffect, useMemo, useRef } = React;

        // Simple SVG Icon Components to replace Lucide
        const Trophy = ({ size = 24, className = "" }) => (
            <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M6 9H4.5a2.5 2.5 0 0 1 0-5H6"/><path d="M18 9h1.5a2.5 2.5 0 0 0 0-5H18"/><path d="M4 22h16"/><path d="M10 14.66V17c0 .55-.47.98-.97 1.21C7.85 18.75 7 20.24 7 22"/><path d="M14 14.66V17c0 .55.47.98.97 1.21C16.15 18.75 17 20.24 17 22"/><path d="M18 2H6v7a6 6 0 0 0 12 0V2Z"/></svg>
        );
        const Sword = ({ size = 24, className = "" }) => (
            <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><polyline points="14.5 17.5 3 6 3 3 6 3 17.5 14.5"/><line x1="13" y1="19" x2="19" y2="13"/><line x1="16" y1="16" x2="20" y2="20"/><line x1="19" y1="21" x2="20" y2="20"/></svg>
        );
        const Dices = ({ size = 24, className = "" }) => (
            <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><rect width="12" height="12" x="2" y="10" rx="2" ry="2"/><path d="m17.92 14 3.5-3.5a2.24 2.24 0 0 0 0-3l-5-5a2.24 2.24 0 0 0-3 0L10 6"/><circle cx="8" cy="16" r="1"/><path d="M15 8h.01"/><path d="M18 5h.01"/></svg>
        );
        const RefreshCcw = ({ size = 24, className = "" }) => (
            <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M21 12a9 9 0 0 0-9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/><path d="M3 12a9 9 0 0 0 9 9 9.75 9.75 0 0 0 6.74-2.74L21 16"/><path d="M16 16h5v5"/></svg>
        );
        const Edit3 = ({ size = 24, className = "" }) => (
            <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M12 20h9"/><path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"/></svg>
        );
        const Ban = ({ size = 16, className = "" }) => (
            <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><circle cx="12" cy="12" r="10"/><path d="m4.93 4.93 14.14 14.14"/></svg>
        );
        const ImageIcon = ({ size = 24, className = "" }) => (
            <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><rect width="18" height="18" x="3" y="3" rx="2" ry="2"/><circle cx="9" cy="9" r="2"/><path d="m21 15-3.086-3.086a2 2 0 0 0-2.828 0L6 21"/></svg>
        );

        const GRID_COLS = 5;
        const GRID_ROWS = 4;
        const INITIAL_TIMER = 30;

        const useAudio = () => {
            const audioCtx = useRef(null);
            const initAudio = () => {
                if (!audioCtx.current) audioCtx.current = new (window.AudioContext || window.webkitAudioContext)();
            };
            const playPassSound = () => {
                initAudio();
                if (audioCtx.current.state === 'suspended') audioCtx.current.resume();
                const now = audioCtx.current.currentTime;
                const osc1 = audioCtx.current.createOscillator();
                const gain1 = audioCtx.current.createGain();
                osc1.type = 'sawtooth';
                osc1.frequency.setValueAtTime(150, now);
                osc1.frequency.exponentialRampToValueAtTime(40, now + 0.4);
                gain1.gain.setValueAtTime(0.3, now);
                gain1.gain.exponentialRampToValueAtTime(0.01, now + 0.4);
                osc1.connect(gain1);
                gain1.connect(audioCtx.current.destination);
                osc1.start(now);
                osc1.stop(now + 0.4);
            };
            const playTick = (freq = 440) => {
                initAudio();
                if (audioCtx.current.state === 'suspended') audioCtx.current.resume();
                const osc = audioCtx.current.createOscillator();
                const gain = audioCtx.current.createGain();
                osc.type = 'sine';
                osc.frequency.setValueAtTime(freq, audioCtx.current.currentTime);
                gain.gain.setValueAtTime(0.1, audioCtx.current.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.current.currentTime + 0.1);
                osc.connect(gain);
                gain.connect(audioCtx.current.destination);
                osc.start();
                osc.stop(audioCtx.current.currentTime + 0.1);
            };
            const playRoundEndMusic = (isWin = true) => {
                initAudio();
                if (audioCtx.current.state === 'suspended') audioCtx.current.resume();
                const now = audioCtx.current.currentTime;
                const melody = isWin ? [440, 554, 659, 880] : [220, 196, 174, 110];
                melody.forEach((freq, i) => {
                    const osc = audioCtx.current.createOscillator();
                    const gain = audioCtx.current.createGain();
                    osc.type = 'triangle';
                    osc.frequency.setValueAtTime(freq, now + i * 0.15);
                    gain.gain.setValueAtTime(0.1, now + i * 0.15);
                    gain.gain.exponentialRampToValueAtTime(0.01, now + (i + 1) * 0.15);
                    osc.connect(gain);
                    gain.connect(audioCtx.current.destination);
                    osc.start(now + i * 0.15);
                    osc.stop(now + (i + 1) * 0.15);
                });
            };
            const playVictoryFanfare = () => {
                initAudio();
                if (audioCtx.current.state === 'suspended') audioCtx.current.resume();
                const now = audioCtx.current.currentTime;
                const notes = [523.25, 659.25, 783.99, 1046.50, 1318.51];
                notes.forEach((freq, i) => {
                    const osc = audioCtx.current.createOscillator();
                    const gain = audioCtx.current.createGain();
                    osc.type = 'square';
                    osc.frequency.setValueAtTime(freq, now + i * 0.12);
                    gain.gain.setValueAtTime(0.05, now + i * 0.12);
                    gain.gain.linearRampToValueAtTime(0, now + i * 0.12 + 0.6);
                    osc.connect(gain);
                    gain.connect(audioCtx.current.destination);
                    osc.start(now + i * 0.12);
                    osc.stop(now + i * 0.12 + 0.6);
                });
            };
            return { playPassSound, playRoundEndMusic, playTick, playVictoryFanfare };
        };

        const AutoScaledText = ({ text, containerWidth, containerHeight, color = "white", maxFontSize = 150 }) => {
            const [fontSize, setFontSize] = useState(12);
            useLayoutEffect(() => {
                if (!text || containerWidth <= 0 || containerHeight <= 0) return;
                const canvas = document.createElement('canvas');
                const context = canvas.getContext('2d');
                const words = text.split(/\s+/);
                let low = 8, high = maxFontSize, bestSize = 8;
                while (low <= high) {
                    const mid = Math.floor((low + high) / 2);
                    context.font = `900 ${mid}px sans-serif`;
                    let maxWordWidth = 0;
                    words.forEach(w => maxWordWidth = Math.max(maxWordWidth, context.measureText(w).width));
                    const lineHeight = mid * 0.9;
                    let lines = 1, currentLineWidth = 0;
                    const spaceWidth = context.measureText(' ').width;
                    words.forEach((word, i) => {
                        const wordWidth = context.measureText(word).width;
                        if (i === 0) { currentLineWidth = wordWidth; }
                        else {
                            if (currentLineWidth + spaceWidth + wordWidth > containerWidth * 0.85) {
                                lines++;
                                currentLineWidth = wordWidth;
                            } else { currentLineWidth += spaceWidth + wordWidth; }
                        }
                    });
                    if (maxWordWidth <= containerWidth * 0.95 && (lines * lineHeight) <= containerHeight * 0.9) {
                        bestSize = mid; low = mid + 1;
                    } else { high = mid - 1; }
                }
                setFontSize(bestSize);
            }, [text, containerWidth, containerHeight, maxFontSize]);
            return (
                <div className="flex items-center justify-center text-center p-1 leading-[0.85] font-black uppercase tracking-tighter select-none pointer-events-none break-words overflow-hidden w-full h-full"
                    style={{ fontSize: `${fontSize}px`, color, textShadow: '0 4px 12px rgba(0,0,0,0.5)' }}>
                    {text}
                </div>
            );
        };

        function App() {
            const [gameState, setGameState] = useState('setup');
            const [cells, setCells] = useState([]);
            const [attacker, setAttacker] = useState(null);
            const [defender, setDefender] = useState(null);
            const [timer, setTimer] = useState({ attacker: INITIAL_TIMER, defender: INITIAL_TIMER });
            const [activeDuelist, setActiveDuelist] = useState(null);
            const [highlightedIndex, setHighlightedIndex] = useState(null);
            const [gridSize, setGridSize] = useState({ width: 0, height: 0 });
            const [decks, setDecks] = useState({});
            const [currentImageIndex, setCurrentImageIndex] = useState(0);
            const [editingRegion, setEditingRegion] = useState(null);
            const [conqueredIndices, setConqueredIndices] = useState([]);
            const [hoveredOwner, setHoveredOwner] = useState(null);
            const [playedPlayers, setPlayedPlayers] = useState(new Set());
            const [isShowingAnswer, setIsShowingAnswer] = useState(false);
            const [lastFeedbackType, setLastFeedbackType] = useState(null);
            const gridRef = useRef(null);
            const { playPassSound, playRoundEndMusic, playTick, playVictoryFanfare } = useAudio();

            const initFloor = () => {
                const categories = ["LOGOS", "FRUITS", "CARS", "MOVIES", "HEROES", "LANDMARKS", "NATIONS", "TOONS", "ANIMALS", "HISTORY", "SCIENCE", "SPORTS", "TOOLS", "FASHION", "GAMING", "DESSERTS", "SPACE", "MUSIC", "BOOKS", "FLAGS"];
                const newCells = categories.map((cat, i) => ({
                    id: i,
                    category: cat,
                    owner: `PLAYER ${i + 1}`,
                    color: `hsl(${(i * 360) / 20}, 70%, 45%)`,
                }));
                setCells(newCells);
                setPlayedPlayers(new Set());
                setGameState('floor');
            };

            useLayoutEffect(() => {
                if (gameState === 'setup' || !gridRef.current) return;
                const measure = () => {
                    if (gridRef.current) {
                        setGridSize({
                            width: gridRef.current.clientWidth,
                            height: gridRef.current.clientHeight
                        });
                    }
                };
                measure();
                const observer = new ResizeObserver(measure);
                observer.observe(gridRef.current);
                window.addEventListener('resize', measure);
                return () => {
                    observer.disconnect();
                    window.removeEventListener('resize', measure);
                };
            }, [gameState]);

            const checkVictory = (currentCells) => {
                const owners = new Set(currentCells.map(c => c.owner));
                if (owners.size === 1) {
                    setGameState('victory');
                    playVictoryFanfare();
                }
            };

            const targetableOwners = useMemo(() => {
                if (!attacker) return [];
                const attackerIndices = cells.map((c, i) => (c.owner === attacker.owner ? i : null)).filter(i => i !== null);
                const neighbors = new Set();
                attackerIndices.forEach(idx => {
                    const r = Math.floor(idx / GRID_COLS), c = idx % GRID_COLS;
                    [{ r: r - 1, c }, { r: r + 1, c }, { r, c: c - 1 }, { r, c: c + 1 }].forEach(p => {
                        if (p.r >= 0 && p.r < GRID_ROWS && p.c >= 0 && p.c < GRID_COLS) {
                            const owner = cells[p.r * GRID_COLS + p.c].owner;
                            if (owner !== attacker.owner) neighbors.add(owner);
                        }
                    });
                });
                return Array.from(neighbors);
            }, [attacker, cells]);

            const handleDuelEnd = (winnerRole) => {
                playRoundEndMusic(true);
                const isAttackerWinner = winnerRole === 'attacker';
                const winningOwnerId = isAttackerWinner ? attacker.owner : defender.owner;
                const losingOwnerId = isAttackerWinner ? defender.owner : attacker.owner;
                const winningColor = isAttackerWinner ? attacker.color : defender.color;
                const finalCategory = attacker.category;

                setPlayedPlayers(prev => {
                    const next = new Set(prev);
                    next.add(attacker.owner);
                    next.add(defender.owner);
                    return next;
                });

                const changedIndices = [];
                const newCells = cells.map((cell, idx) => {
                    if (cell.owner === losingOwnerId) {
                        changedIndices.push(idx);
                        return { ...cell, owner: winningOwnerId, color: winningColor, category: finalCategory };
                    }
                    if (cell.owner === winningOwnerId) return { ...cell, category: finalCategory };
                    return cell;
                });

                setConqueredIndices(changedIndices);
                setCells(newCells);
                setGameState('floor');
                setActiveDuelist(null);
                setAttacker({ owner: winningOwnerId, category: finalCategory, color: winningColor });
                setDefender(null);
                checkVictory(newCells);
                setTimeout(() => setConqueredIndices([]), 2000);
            };

            const cancelDuel = () => {
                setGameState('floor');
                setActiveDuelist(null);
                setAttacker(null);
                setDefender(null);
            };

            const startDuel = (owner, category, color) => {
                if (gameState !== 'floor' || gameState === 'randomizing') return;
                if (attacker && owner === attacker.owner) { setAttacker(null); return; }
                if (!attacker) {
                    setAttacker({ owner, category, color });
                } else if (targetableOwners.includes(owner)) {
                    setDefender({ owner, category, color });
                    setTimer({ attacker: INITIAL_TIMER, defender: INITIAL_TIMER });
                    setActiveDuelist('attacker');
                    setCurrentImageIndex(0);
                    setGameState('duel');
                }
            };

            const pickRandomAttacker = () => {
                setGameState('randomizing');
                setAttacker(null);
                const uniqueOwners = Array.from(new Set(cells.map(c => c.owner)));
                if (uniqueOwners.length <= 1) return;
                let candidates = uniqueOwners.filter(owner => !playedPlayers.has(owner));
                if (candidates.length === 0) {
                    candidates = uniqueOwners;
                    setPlayedPlayers(new Set());
                }
                let duration = 3000, elapsed = 0, interval = 60;
                const run = () => {
                    const idx = Math.floor(Math.random() * cells.length);
                    setHighlightedIndex(idx);
                    playTick(200 + (elapsed / duration) * 400);
                    elapsed += interval;
                    interval = Math.min(400, interval * 1.05);
                    if (elapsed < duration) setTimeout(run, interval);
                    else {
                        const winner = candidates[Math.floor(Math.random() * candidates.length)];
                        const cell = cells.find(c => c.owner === winner);
                        const finalIdx = cells.indexOf(cell);
                        setHighlightedIndex(finalIdx);
                        setTimeout(() => {
                            setAttacker({ owner: cell.owner, category: cell.category, color: cell.color });
                            setHighlightedIndex(null);
                            setGameState('floor');
                        }, 1500);
                    }
                };
                run();
            };

            useEffect(() => {
                let interval;
                if (gameState === 'duel' && activeDuelist && !isShowingAnswer) {
                    interval = setInterval(() => {
                        setTimer(prev => {
                            const val = prev[activeDuelist] - 1;
                            if (val <= 5 && val > 0) playTick(880);
                            if (val <= 0) {
                                handleDuelEnd(activeDuelist === 'attacker' ? 'defender' : 'attacker');
                                return { ...prev, [activeDuelist]: 0 };
                            }
                            return { ...prev, [activeDuelist]: val };
                        });
                    }, 1000);
                }
                return () => clearInterval(interval);
            }, [gameState, activeDuelist, isShowingAnswer]);

            if (gameState === 'setup') {
                return (
                    <div className="h-screen bg-slate-950 flex flex-col items-center justify-center p-4">
                        <div className="flex flex-col items-center mb-12">
                            <span className="text-blue-400 font-bold tracking-[0.2em] mb-2 uppercase text-sm">HKTAYY3 Presents:</span>
                            <div className="text-8xl font-black text-blue-500 italic uppercase tracking-tighter drop-shadow-[0_15px_15px_rgba(0,0,0,0.5)] text-center">THE FLOOR</div>
                        </div>
                        <button onClick={initFloor} className="bg-blue-600 hover:bg-blue-500 px-12 py-6 rounded-2xl font-black text-3xl shadow-[0_8px_0_rgb(30,58,138)] transition-all active:translate-y-2">START NEW GAME</button>
                    </div>
                );
            }

            const regions = []; 
            const visited = new Set();
            cells.forEach((cell, idx) => {
                if (visited.has(idx)) return;
                const current = { owner: cell.owner, category: cell.category, color: cell.color, indices: [], minR: 99, maxR: -1, minC: 99, maxC: -1 };
                const q = [idx]; visited.add(idx);
                while (q.length > 0) {
                    const curr = q.shift();
                    const r = Math.floor(curr / GRID_COLS), c = curr % GRID_COLS;
                    current.indices.push(curr);
                    current.minR = Math.min(current.minR, r); current.maxR = Math.max(current.maxR, r);
                    current.minC = Math.min(current.minC, c); current.maxC = Math.max(current.maxC, c);
                    [{ r: r-1, c }, { r: r+1, c }, { r, c: c-1 }, { r, c: c+1 }].forEach(n => {
                        const nIdx = n.r * GRID_COLS + n.c;
                        if (n.r >= 0 && n.r < GRID_ROWS && n.c >= 0 && n.c < GRID_COLS && !visited.has(nIdx) && cells[nIdx].owner === cell.owner) {
                            visited.add(nIdx); q.push(nIdx);
                        }
                    });
                }
                let sumR = 0, sumC = 0;
                current.indices.forEach(idx => { sumR += Math.floor(idx / GRID_COLS); sumC += idx % GRID_COLS; });
                const avgR = sumR / current.indices.length; const avgC = sumC / current.indices.length;
                let bestIdx = current.indices[0], minDist = Infinity;
                current.indices.forEach(idx => {
                    const r = Math.floor(idx / GRID_COLS), c = idx % GRID_COLS;
                    const dist = Math.pow(r - avgR, 2) + Math.pow(c - avgC, 2);
                    if (dist < minDist) { minDist = dist; bestIdx = idx; }
                });
                current.centerIdx = bestIdx;
                regions.push(current);
            });

            return (
                <div className="h-screen bg-black text-white flex flex-col font-sans select-none overflow-hidden">
                    <header className="h-16 bg-slate-900 border-b border-white/5 flex justify-between items-center px-8 z-[60] relative">
                        <div className="flex items-center gap-6">
                            <div className="flex flex-col">
                                <span className="text-blue-400 font-bold text-[10px] uppercase tracking-widest leading-none mb-1">HKTAYY3 Presents:</span>
                                <span className="text-blue-500 font-black italic text-xl uppercase tracking-tighter leading-none">THE FLOOR</span>
                            </div>
                        </div>
                        {gameState === 'duel' && (
                            <div className="flex gap-12 items-center">
                                <div className={`flex flex-col items-center transition-all duration-300 ${activeDuelist === 'attacker' ? 'scale-110' : 'opacity-30'}`}>
                                    <span className="text-[10px] font-black uppercase text-red-400">{attacker?.owner}</span>
                                    <div className="text-3xl font-mono font-black">{timer.attacker}</div>
                                </div>
                                <div className="text-lg italic font-black text-slate-700">VS</div>
                                <div className={`flex flex-col items-center transition-all duration-300 ${activeDuelist === 'defender' ? 'scale-110' : 'opacity-30'}`}>
                                    <span className="text-[10px] font-black uppercase text-blue-400">{defender?.owner}</span>
                                    <div className="text-3xl font-mono font-black">{timer.defender}</div>
                                </div>
                            </div>
                        )}
                        <div className="flex gap-4">
                            {gameState === 'duel' ? (
                                <button onClick={cancelDuel} className="bg-red-600 px-6 py-2 rounded-xl font-black flex items-center gap-2 text-sm"><Ban /> CANCEL DUEL</button>
                            ) : (
                                <button onClick={pickRandomAttacker} disabled={gameState !== 'floor' || attacker} className="bg-white text-black px-6 py-2 rounded-xl font-black flex items-center gap-2 text-sm"><Dices /> RANDOMIZER</button>
                            )}
                        </div>
                    </header>
                    <main className="flex-1 relative bg-slate-950 overflow-hidden">
                        <div className="w-full h-full relative" ref={gridRef}>
                            <div className="w-full h-full grid grid-cols-5 grid-rows-4 absolute inset-0">
                                {cells.map((cell, idx) => (
                                    <div key={idx} onClick={() => startDuel(cell.owner, cell.category, cell.color)}
                                        className={`relative border border-white/10 transition-all cursor-pointer ${attacker && attacker.owner !== cell.owner && !targetableOwners.includes(cell.owner) ? 'opacity-20 grayscale' : ''}`}
                                        style={{ backgroundColor: cell.color }}>
                                    </div>
                                ))}
                            </div>
                            {gridSize.width > 0 && regions.map((region, idx) => {
                                const cellW = gridSize.width / GRID_COLS; const cellH = gridSize.height / GRID_ROWS;
                                const centerX = (region.centerIdx % GRID_COLS) * cellW + (cellW / 2);
                                const centerY = Math.floor(region.centerIdx / GRID_COLS) * cellH + (cellH / 2);
                                return (
                                    <div key={idx} className="absolute pointer-events-none" style={{ left: centerX, top: centerY, transform: 'translate(-50%, -50%)' }}>
                                        <div className="bg-black/60 px-2 py-1 rounded text-[10px] font-bold text-white mb-1">{region.owner}</div>
                                        <AutoScaledText text={region.category} containerWidth={cellW * 0.8} containerHeight={cellH * 0.3} maxFontSize={18} />
                                    </div>
                                );
                            })}
                        </div>
                    </main>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
